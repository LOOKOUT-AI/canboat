name: Build Debian package

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    env:
      PACKAGE_NAME: lookout-canboat
      DEB_BUILD_OPTIONS: nostrip
      DEB_HOST_ARCH: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts dpkg-dev fakeroot \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build arm64 Debian package
        run: |
          debian/rules clean || true
          dpkg-buildpackage -us -uc -b -a${DEB_HOST_ARCH} -d

      - name: Verify package metadata
        run: |
          DEB=$(find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.deb" | head -n 1)
          dpkg-deb -f "$DEB" Package Version Architecture

      - name: Collect build artifacts
        run: |
          mkdir -p artifacts
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.deb" -exec cp -v {} artifacts/ \;
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.ddeb" -exec cp -v {} artifacts/ \; || true
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.changes" -exec cp -v {} artifacts/ \;
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.buildinfo" -exec cp -v {} artifacts/ \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
