name: Build Debian package

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      upload_to_gcs:
        description: Upload collected package artifacts to the supplied GCS URI
        required: false
        default: false
        type: boolean
      gcs_artifact_uri:
        description: GCS URI for collected package artifacts, for example gs://bucket/path/repo
        required: false
        default: ''
        type: string
      gcp_workload_identity_provider:
        description: GCP Workload Identity Provider to use when upload_to_gcs is true
        required: false
        default: ''
        type: string
      gcp_service_account:
        description: GCP service account to use when upload_to_gcs is true
        required: false
        default: ''
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    env:
      PACKAGE_NAME: lookout-canboat
      DEB_BUILD_OPTIONS: nostrip
      DEB_HOST_ARCH: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts dpkg-dev fakeroot \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build arm64 Debian package
        run: |
          debian/rules clean || true
          dpkg-buildpackage -us -uc -b -a${DEB_HOST_ARCH} -d

      - name: Verify package metadata
        run: |
          DEB=$(find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.deb" | head -n 1)
          dpkg-deb -f "$DEB" Package Version Architecture

      - name: Collect build artifacts
        run: |
          mkdir -p artifacts
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.deb" -exec cp -v {} artifacts/ \;
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.ddeb" -exec cp -v {} artifacts/ \; || true
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.changes" -exec cp -v {} artifacts/ \;
          find .. -maxdepth 1 -name "${PACKAGE_NAME}_*.buildinfo" -exec cp -v {} artifacts/ \;

      - name: Validate GCS artifact input
        if: ${{ inputs.upload_to_gcs }}
        env:
          GCS_ARTIFACT_URI: ${{ inputs.gcs_artifact_uri }}
          GCP_WORKLOAD_IDENTITY_PROVIDER_INPUT: ${{ inputs.gcp_workload_identity_provider }}
          GCP_SERVICE_ACCOUNT_INPUT: ${{ inputs.gcp_service_account }}
        run: |
          set -euo pipefail
          if [ -z "${GCS_ARTIFACT_URI}" ]; then
            echo "upload_to_gcs=true requires gcs_artifact_uri." >&2
            exit 1
          fi
          if [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER_INPUT}" ]; then
            echo "upload_to_gcs=true requires gcp_workload_identity_provider." >&2
            exit 1
          fi
          if [ -z "${GCP_SERVICE_ACCOUNT_INPUT}" ]; then
            echo "upload_to_gcs=true requires gcp_service_account." >&2
            exit 1
          fi

      - name: Set up gcloud auth
        if: ${{ inputs.upload_to_gcs }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account: ${{ inputs.gcp_service_account }}

      - name: Set up Cloud SDK
        if: ${{ inputs.upload_to_gcs }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload build artifacts to GCS
        if: ${{ inputs.upload_to_gcs }}
        run: |
          set -euo pipefail
          gsutil -m cp artifacts/* "${{ inputs.gcs_artifact_uri }}/"

      - name: Upload build artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 1
